services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: atomize-planner-app
    container_name: atomize-planner-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      # Ensure database directory is persistent if using SQLite
      - app-db:/var/www/html/database
    networks:
      - atomize-network

  web:
    image: nginx:alpine
    container_name: atomize-planner-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - atomize-network

networks:
  atomize-network:
    driver: bridge

volumes:
  app-db:
